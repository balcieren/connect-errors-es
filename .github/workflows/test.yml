name: Test
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm test
      - name: Run tests with coverage
        run: npm test -- --coverage
      - name: Check coverage threshold (src/ >= 85%)
        run: |
          COVERAGE=$(npm test -- --coverage 2>&1 | grep "^ src " | head -1 | awk '{print $3}')
          echo "src/ coverage: ${COVERAGE}%"
          THRESHOLD=85
          INTEGER=$(echo "$COVERAGE" | cut -d. -f1)
          if [ "$INTEGER" -lt "$THRESHOLD" ]; then
            echo "::error::Coverage ${COVERAGE}% is below ${THRESHOLD}% threshold"
            exit 1
          fi
          echo "Coverage ${COVERAGE}% meets ${THRESHOLD}% threshold"
